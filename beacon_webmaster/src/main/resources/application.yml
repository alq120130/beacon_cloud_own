server:
  port: 10087
# MyBatis和dataSource配置
spring:
  datasource:
    driver-class-name: org.gjt.mm.mysql.Driver
    url: jdbc:mysql://192.168.1.19:3306/beacon-cloud?characterEncoding=utf-8
    username: root
    password: 123456
    type: com.alibaba.druid.pool.DruidDataSource
# 服务名称
  application:
    name: beacon-webmaster
  # 多环境
  profiles:
    active: dev
  # nacos注册中心地址
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.1.19:8848
      # nacos配置中心地址:
      config:
        server-addr: 192.168.1.19:8848
        file-extension: yml
        # beacon-search-dev.yml

# MyBatis
mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

# shiro配置
shiro:
  # 默认登录页面
  loginUrl: /login.html
  # 没有权限的页面
  unauthorizedUrl: unauthorized.html

